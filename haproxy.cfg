global
    log stdout format raw local0

defaults
    mode http
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    option httplog
    log global

frontend http
    bind *:8080
    default_backend grain

backend grain
    balance roundrobin
    cookie GRAIN_TENANT_STICKY insert indirect nocache
    option redispatch
    retry-on 503
    retries 5
    server node-a node-a:8080 check cookie node-a
    server node-b node-b:8080 check cookie node-b
    server node-c node-c:8080 check cookie node-c

listen stats
    bind *:8404
    stats enable
    stats uri /
    stats refresh 5s
