services:
  postgres:
    image: pgvector/pgvector:0.8.0-pg17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: grain_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  node-a:
    build:
      context: .
      dockerfile: Dockerfile.cp-test
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_USER: postgres
      PG_PASSWORD: password
      PG_DATABASE: grain_test
      NREPL_PORT: "7890"
    ports:
      - "7890:7890"
    depends_on:
      postgres:
        condition: service_healthy

  node-b:
    build:
      context: .
      dockerfile: Dockerfile.cp-test
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_USER: postgres
      PG_PASSWORD: password
      PG_DATABASE: grain_test
      NREPL_PORT: "7891"
      START_DELAY_MS: "3000"
    ports:
      - "7891:7891"
    depends_on:
      postgres:
        condition: service_healthy
