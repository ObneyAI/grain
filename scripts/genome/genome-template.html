<title>grain · component genome</title>
<style>
  :root{
    --bg:#0c1012; --bg2:#080b0c; --grid:rgba(150,175,160,.06); --gridline:rgba(150,175,160,.03);
    --surface:rgba(20,27,26,.74); --surface-solid:#121a18;
    --border:rgba(150,180,168,.14); --border-str:rgba(160,195,180,.3);
    --ink:#e8f0ea; --ink-dim:#9aad9f; --ink-faint:#6b7a72;
    --c-found:#8b93ac; --c-log:#45c4b1; --c-write:#d5a24a;
    --c-read:#6f8cd8; --c-apps:#a986d6; --c-ops:#c77b6b;
    --edge:rgba(150,170,205,.16);
    --trace:rgba(196,150,86,.3); --trace-via:#0c1012; --trace-pad:rgba(210,168,104,.5);
    --font-sans:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Helvetica,sans-serif;
    --font-mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;
    --shadow:0 18px 50px -12px rgba(0,0,0,.7);
  }
  @media (prefers-color-scheme: light){
    :root{
      --bg:#e8ece7; --bg2:#dde3dc; --grid:rgba(60,90,70,.1); --gridline:rgba(60,90,70,.05);
      --surface:rgba(255,255,255,.8); --surface-solid:#ffffff;
      --border:rgba(40,70,55,.16); --border-str:rgba(40,70,55,.34);
      --ink:#18251e; --ink-dim:#47584d; --ink-faint:#83938a;
      --c-found:#5f6b86; --c-log:#1c8f7f; --c-write:#ab7614;
      --c-read:#3d5cc0; --c-apps:#8253b8; --c-ops:#b0523c;
      --edge:rgba(50,70,120,.2); --shadow:0 18px 44px -16px rgba(30,45,80,.35);
      --trace:rgba(150,102,44,.46); --trace-via:#e8ece7; --trace-pad:rgba(150,102,44,.6);
    }
  }
  :root[data-theme="dark"]{
    --bg:#0c1012; --bg2:#080b0c; --grid:rgba(150,175,160,.06); --gridline:rgba(150,175,160,.03);
    --surface:rgba(20,27,26,.74); --surface-solid:#121a18;
    --border:rgba(150,180,168,.14); --border-str:rgba(160,195,180,.3);
    --ink:#e8f0ea; --ink-dim:#9aad9f; --ink-faint:#6b7a72;
    --c-found:#8b93ac; --c-log:#45c4b1; --c-write:#d5a24a;
    --c-read:#6f8cd8; --c-apps:#a986d6; --c-ops:#c77b6b;
    --edge:rgba(150,170,205,.16); --shadow:0 18px 50px -12px rgba(0,0,0,.7);
    --trace:rgba(196,150,86,.3); --trace-via:#0c1012; --trace-pad:rgba(210,168,104,.5);
  }
  :root[data-theme="light"]{
    --bg:#e8ece7; --bg2:#dde3dc; --grid:rgba(60,90,70,.1); --gridline:rgba(60,90,70,.05);
    --surface:rgba(255,255,255,.8); --surface-solid:#ffffff;
    --border:rgba(40,70,55,.16); --border-str:rgba(40,70,55,.34);
    --ink:#18251e; --ink-dim:#47584d; --ink-faint:#83938a;
    --c-found:#5f6b86; --c-log:#1c8f7f; --c-write:#ab7614;
    --c-read:#3d5cc0; --c-apps:#8253b8; --c-ops:#b0523c;
    --edge:rgba(50,70,120,.2); --shadow:0 18px 44px -16px rgba(30,45,80,.35);
    --trace:rgba(150,102,44,.46); --trace-via:#e8ece7; --trace-pad:rgba(150,102,44,.6);
  }

  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font-family:var(--font-sans); color:var(--ink); background:var(--bg);
    overflow:hidden; -webkit-font-smoothing:antialiased; user-select:none;}

  #viewport{position:fixed; inset:0; overflow:hidden; cursor:grab;
    background:
      radial-gradient(1200px 820px at 50% 62%, color-mix(in srgb,var(--c-log) 9%, transparent), transparent 62%),
      radial-gradient(900px 700px at 26% 52%, color-mix(in srgb,var(--c-write) 5%, transparent), transparent 60%),
      radial-gradient(900px 700px at 74% 52%, color-mix(in srgb,var(--c-read) 5%, transparent), transparent 60%),
      radial-gradient(140% 120% at 50% 0%, var(--bg), var(--bg2) 70%);}
  #viewport.grabbing{cursor:grabbing}
  #world{position:absolute; top:0; left:0; width:2560px; height:1660px;
    transform-origin:0 0; will-change:transform;}
  /* PCB substrate: fine solder-mask grid + coarse copper-plane lines + registration dots */
  #grid{position:absolute; inset:0;
    background-image:
      linear-gradient(var(--gridline) 1px, transparent 1px),
      linear-gradient(90deg, var(--gridline) 1px, transparent 1px),
      radial-gradient(var(--grid) 1.3px, transparent 1.3px);
    background-size:128px 128px, 128px 128px, 32px 32px;
    background-position:0 0, 0 0, 16px 16px;
    -webkit-mask-image:radial-gradient(125% 125% at 50% 50%, #000 52%, transparent 94%);
            mask-image:radial-gradient(125% 125% at 50% 50%, #000 52%, transparent 94%);}
  #edges{position:absolute; inset:0; width:100%; height:100%; overflow:visible; pointer-events:none;}
  #edges path{fill:none; stroke:var(--trace); stroke-width:1.7;
    stroke-linejoin:round; stroke-linecap:round; transition:opacity .2s, stroke-width .2s;}
  #edges path.hot{stroke-width:2.6; opacity:1 !important; filter:drop-shadow(0 0 5px currentColor);}
  .via{fill:var(--trace-via); stroke:var(--trace); stroke-width:.9; opacity:.55; transition:opacity .2s;}
  .via.hot{opacity:1; stroke-width:1.2;}
  .pad{fill:var(--trace-via); stroke:var(--trace-pad); stroke-width:1.3; opacity:.7;}

  .zone{position:absolute; font-family:var(--font-mono); font-size:12.5px; letter-spacing:.3em;
    text-transform:uppercase; color:var(--ink-faint); pointer-events:none; white-space:nowrap;
    transform:translateY(-50%); opacity:.6;}

  .node{position:absolute; transform:translate(-50%,-50%);
    display:flex; flex-direction:column; gap:5px; min-width:118px; max-width:200px;
    padding:11px 14px 12px; border-radius:6px; cursor:pointer;
    background:linear-gradient(180deg, color-mix(in srgb,var(--surface-solid) 88%, var(--accent) 12%), var(--surface-solid));
    border:1px solid color-mix(in srgb,var(--accent) 48%, var(--border));
    box-shadow: inset 0 1px 0 rgba(255,255,255,.055), 0 0 0 1px rgba(0,0,0,.22),
      0 8px 22px -12px rgba(0,0,0,.6), 0 0 var(--glow) -4px var(--accent);
    transition:transform .16s cubic-bezier(.2,.8,.2,1), opacity .2s, box-shadow .2s, border-color .2s;}
  /* silkscreen footprint outline — reads as a component pad on the board */
  .node::before{content:""; position:absolute; inset:3px; border-radius:3px; pointer-events:none;
    border:1px dashed color-mix(in srgb,var(--accent) 24%, transparent);}
  .node:hover{transform:translate(-50%,-50%) scale(1.05); z-index:20;}
  .node .nid{font-family:var(--font-mono); font-weight:600; line-height:1.15; color:var(--ink);
    letter-spacing:-.01em; word-break:break-word;}
  .node .nmeta{display:flex; align-items:center; gap:7px; font-family:var(--font-mono);
    font-size:10.5px; color:var(--ink-dim); font-variant-numeric:tabular-nums;}
  .node .dot{width:7px; height:7px; border-radius:50%; background:var(--accent);
    box-shadow:0 0 8px var(--accent); flex:none;}
  .node .role{margin-left:auto; font-size:9.5px; letter-spacing:.02em; color:var(--accent); opacity:.9;}
  .node.selected{border-color:var(--accent); transform:translate(-50%,-50%) scale(1.07); z-index:25;
    box-shadow:0 0 0 1px var(--accent), 0 0 42px -6px var(--accent), 0 14px 30px -14px rgba(0,0,0,.8);}
  .node.dim{opacity:.12; filter:saturate(.4);}
  .node.neighbor{border-color:color-mix(in srgb,var(--accent) 70%, var(--border));}
  .fanbadge{position:absolute; top:-9px; right:-9px; min-width:19px; height:19px; padding:0 5px;
    border-radius:20px; background:var(--surface-solid); border:1px solid var(--accent); color:var(--accent);
    font-family:var(--font-mono); font-size:10.5px; font-weight:700; display:none; align-items:center;
    justify-content:center; box-shadow:0 2px 8px rgba(0,0,0,.4); font-variant-numeric:tabular-nums;}
  .node[data-fanin]:not([data-fanin="0"]) .fanbadge{display:flex;}

  .glass{background:var(--surface); backdrop-filter:blur(16px) saturate(1.4);
    -webkit-backdrop-filter:blur(16px) saturate(1.4);
    border:1px solid var(--border); border-radius:16px; box-shadow:var(--shadow);}
  #hud{position:fixed; top:20px; left:20px; z-index:60; padding:18px 20px 16px; max-width:346px;}
  #hud .kick{font-family:var(--font-mono); font-size:11px; letter-spacing:.32em; text-transform:uppercase;
    color:var(--c-log); margin:0 0 5px;}
  #hud h1{margin:0; font-size:25px; font-weight:680; letter-spacing:-.02em;}
  #hud h1 b{color:var(--ink-dim); font-weight:680;}
  #hud p{margin:8px 0 15px; font-size:12.5px; line-height:1.5; color:var(--ink-dim); max-width:300px;}
  .stats{display:flex; gap:8px; flex-wrap:wrap;}
  .stat{flex:1 1 auto; min-width:70px; padding:9px 11px; border-radius:11px;
    background:color-mix(in srgb,var(--surface-solid) 60%, transparent); border:1px solid var(--border);}
  .stat .v{font-family:var(--font-mono); font-size:19px; font-weight:700; letter-spacing:-.02em;
    font-variant-numeric:tabular-nums; line-height:1;}
  .stat .l{font-size:10px; color:var(--ink-faint); margin-top:4px; letter-spacing:.02em;}
  .stat.log .v{color:var(--c-log)} .stat.mut .v{color:var(--ink-faint)}

  #legend{position:fixed; left:20px; bottom:20px; z-index:60; padding:13px 15px;}
  #legend .lt{font-family:var(--font-mono); font-size:10px; letter-spacing:.26em; text-transform:uppercase;
    color:var(--ink-faint); margin-bottom:9px;}
  .leg{display:flex; align-items:center; gap:9px; padding:5px 8px; margin:1px -4px; border-radius:8px;
    cursor:pointer; font-size:12px; color:var(--ink-dim); transition:background .15s,color .15s;}
  .leg:hover{background:color-mix(in srgb,var(--ink) 7%, transparent); color:var(--ink);}
  .leg.off{opacity:.34;}
  .leg .sw{width:11px; height:11px; border-radius:3.5px; background:var(--accent); flex:none;
    box-shadow:0 0 10px -1px var(--accent);}
  .leg .cnt{margin-left:auto; font-family:var(--font-mono); font-size:10.5px; color:var(--ink-faint);
    font-variant-numeric:tabular-nums;}

  #controls{position:fixed; right:20px; bottom:20px; z-index:60; display:flex; gap:7px; align-items:center;}
  .btn{width:40px; height:40px; display:flex; align-items:center; justify-content:center; font-size:19px;
    color:var(--ink-dim); cursor:pointer; border-radius:11px; background:var(--surface);
    border:1px solid var(--border); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    transition:color .15s, border-color .15s;}
  .btn:hover{color:var(--ink); border-color:var(--border-str);}
  .btn.wide{width:auto; padding:0 15px; font-size:12px; font-family:var(--font-mono); letter-spacing:.04em; gap:7px;}

  #inspector{position:fixed; top:20px; right:20px; bottom:20px; width:340px; z-index:70; padding:0;
    overflow:hidden; display:flex; flex-direction:column;
    transform:translateX(calc(100% + 28px)); transition:transform .34s cubic-bezier(.3,.9,.25,1);}
  #inspector.open{transform:none;}
  .insp-head{padding:20px 20px 16px; border-bottom:1px solid var(--border); position:relative;
    background:linear-gradient(180deg, color-mix(in srgb,var(--accent) 12%, transparent), transparent);}
  .insp-head .lin{display:inline-block; font-family:var(--font-mono); font-size:10px; font-weight:700;
    letter-spacing:.1em; text-transform:uppercase; color:var(--accent); padding:2px 9px; border-radius:20px;
    background:color-mix(in srgb,var(--accent) 15%, transparent);
    border:1px solid color-mix(in srgb,var(--accent) 34%, transparent); margin-bottom:11px;}
  .insp-head h2{margin:0; font-family:var(--font-mono); font-size:19px; font-weight:650; letter-spacing:-.02em;
    word-break:break-word; line-height:1.15;}
  .insp-head .desc{margin:9px 0 0; font-size:13px; line-height:1.5; color:var(--ink-dim);}
  .insp-close{position:absolute; top:16px; right:16px; width:28px; height:28px; border-radius:8px;
    display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--ink-faint);
    border:1px solid var(--border); background:var(--surface-solid); font-size:15px;}
  .insp-close:hover{color:var(--ink);}
  .insp-body{padding:16px 20px 22px; overflow-y:auto; flex:1;}
  .metrics{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:20px;}
  .metrics .m{padding:11px 10px; border-radius:11px; text-align:center;
    background:color-mix(in srgb,var(--surface-solid) 55%, transparent); border:1px solid var(--border);}
  .metrics .m .v{font-family:var(--font-mono); font-size:21px; font-weight:700; line-height:1; font-variant-numeric:tabular-nums;}
  .metrics .m .l{font-size:9.5px; color:var(--ink-faint); margin-top:5px; text-transform:uppercase; letter-spacing:.08em;}
  .rel h3{font-family:var(--font-mono); font-size:10.5px; letter-spacing:.2em; text-transform:uppercase;
    color:var(--ink-faint); margin:18px 0 9px; display:flex; align-items:center; gap:8px;}
  .rel h3 .n{color:var(--ink-dim);}
  .chips{display:flex; flex-wrap:wrap; gap:6px;}
  .chip{font-family:var(--font-mono); font-size:11.5px; padding:4px 9px; border-radius:8px; cursor:pointer;
    color:var(--ink-dim); background:color-mix(in srgb,var(--surface-solid) 60%, transparent);
    border:1px solid var(--border); transition:color .14s, border-color .14s, background .14s;}
  .chip:hover{color:var(--ink); border-color:var(--chip-c); background:color-mix(in srgb,var(--chip-c) 12%, transparent);}
  .chip .cd{display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--chip-c);
    margin-right:6px; vertical-align:middle;}
  .rel .empty{font-size:12px; color:var(--ink-faint); font-style:italic;}

  .hint{position:fixed; bottom:22px; left:50%; transform:translateX(-50%); z-index:55; font-size:11.5px;
    color:var(--ink-faint); font-family:var(--font-mono); letter-spacing:.04em; pointer-events:none;
    opacity:.8; transition:opacity .4s; text-align:center;}
  @media (max-width:820px){
    #hud{max-width:none; right:20px; left:20px;}
    #inspector{width:auto; left:20px;}
    #legend{display:none;}
    .hint{display:none;}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none !important; animation:none !important;}}
  .dashsel{stroke-dasharray:7 6; animation:march 1s linear infinite;}
  @keyframes march{to{stroke-dashoffset:-13;}}

  /* type-signal colours (independent of cluster) */
  :root{--macro-c:#d9b451; --proto-c:#4fc7d6;}
  :root[data-theme="light"]{--macro-c:#a67c15; --proto-c:#1c8a99;}
  @media (prefers-color-scheme:light){:root{--macro-c:#a67c15; --proto-c:#1c8a99;}}
  .stat.macro .v{color:var(--macro-c)} .stat.proto .v{color:var(--proto-c)}

  /* lens toolbar */
  #lenses{position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:62;
    display:flex; align-items:center; gap:4px; padding:6px 8px;}
  #lenses .lens-lbl{font-family:var(--font-mono); font-size:10px; letter-spacing:.24em; text-transform:uppercase;
    color:var(--ink-faint); padding:0 8px 0 4px;}
  .lensbtn{font-family:var(--font-mono); font-size:12px; color:var(--ink-dim); cursor:pointer;
    padding:6px 12px; border-radius:9px; display:flex; align-items:center; gap:6px; transition:.15s;}
  .lensbtn:hover{color:var(--ink); background:color-mix(in srgb,var(--ink) 7%, transparent);}
  .lensbtn.active{color:var(--ink); background:color-mix(in srgb,var(--ink) 11%, transparent);
    box-shadow:inset 0 0 0 1px var(--border-str);}
  .lensbtn .g{font-size:13px; line-height:1;}
  .lensbtn .gm{color:var(--macro-c)} .lensbtn .gp{color:var(--proto-c)}

  /* type glyph on nodes (top-left) */
  .typeglyph{position:absolute; top:-9px; left:-9px; width:20px; height:20px; border-radius:6px;
    display:none; align-items:center; justify-content:center; font-family:var(--font-mono);
    font-size:12px; font-weight:700; background:var(--surface-solid);
    box-shadow:0 2px 8px rgba(0,0,0,.4);}
  .node.has-macro .typeglyph{display:flex; color:var(--macro-c); border:1px solid var(--macro-c);}
  .node.has-proto .typeglyph{display:flex; color:var(--proto-c); border:1px solid var(--proto-c);}
  .node.has-impl .typeglyph{display:flex; color:var(--proto-c); border:1px dashed color-mix(in srgb,var(--proto-c) 60%, transparent);}

  /* inspector "exposes" chips */
  .exposes{display:flex; flex-wrap:wrap; gap:6px; margin-top:13px;}
  .expo{font-family:var(--font-mono); font-size:11px; padding:3px 9px; border-radius:7px; font-weight:600;
    display:flex; align-items:center; gap:5px;}
  .expo.m{color:var(--macro-c); background:color-mix(in srgb,var(--macro-c) 13%, transparent);
    border:1px solid color-mix(in srgb,var(--macro-c) 32%, transparent);}
  .expo.p{color:var(--proto-c); background:color-mix(in srgb,var(--proto-c) 13%, transparent);
    border:1px solid color-mix(in srgb,var(--proto-c) 32%, transparent);}
  @media (max-width:900px){#lenses{top:auto; bottom:74px;}}

  /* ---- standalone catalog board (lives on the canvas) ---- */
  #catalog{position:absolute; left:2620px; top:200px; width:1200px; padding:34px 38px 40px;
    border-radius:24px; background:
      linear-gradient(180deg, color-mix(in srgb,var(--surface-solid) 96%, var(--macro-c) 4%), var(--surface-solid));
    border:1px solid var(--border-str); box-shadow:0 40px 90px -30px rgba(0,0,0,.6);}
  #catalog .cat-kick{font-family:var(--font-mono); font-size:13px; letter-spacing:.32em; text-transform:uppercase;
    color:var(--ink-faint); margin:0 0 8px;}
  #catalog h2.cat-title{margin:0; font-size:38px; font-weight:700; letter-spacing:-.02em;}
  #catalog .cat-lede{margin:12px 0 30px; font-size:15px; line-height:1.55; color:var(--ink-dim); max-width:760px;}
  #catalog .cat-lede b.mm{color:var(--macro-c)} #catalog .cat-lede b.pp{color:var(--proto-c)}
  .cat-sec{margin-top:14px;}
  .cat-sec-h{display:flex; align-items:baseline; gap:12px; margin:26px 0 16px; padding-bottom:12px;
    border-bottom:1px solid var(--border);}
  .cat-sec-h .sg{font-family:var(--font-mono); font-size:22px; font-weight:700; line-height:1;}
  .cat-sec-h.macro .sg{color:var(--macro-c)} .cat-sec-h.proto .sg{color:var(--proto-c)}
  .cat-sec-h h3{margin:0; font-size:19px; font-weight:650; letter-spacing:-.01em;}
  .cat-sec-h .ct{font-family:var(--font-mono); font-size:13px; color:var(--ink-faint); margin-left:auto;
    font-variant-numeric:tabular-nums;}
  .grp-title{font-family:var(--font-mono); font-size:11px; letter-spacing:.2em; text-transform:uppercase;
    color:var(--ink-faint); margin:20px 0 12px;}
  .mgrid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .entry{padding:15px 17px; border-radius:14px; border:1px solid var(--border);
    background:color-mix(in srgb,var(--surface-solid) 66%, transparent); border-left:3px solid var(--ec);}
  .entry.m{--ec:var(--macro-c)} .entry.p{--ec:var(--proto-c)}
  .entry .en-top{display:flex; align-items:center; gap:9px;}
  .entry .en-g{font-family:var(--font-mono); font-size:16px; font-weight:700; color:var(--ec);}
  .entry .en-name{font-family:var(--font-mono); font-size:16.5px; font-weight:650; letter-spacing:-.01em;}
  .entry .en-sig{font-family:var(--font-mono); font-size:12px; color:var(--ink-dim); margin:9px 0 0;
    background:color-mix(in srgb,var(--ink) 5%, transparent); padding:6px 9px; border-radius:7px;
    overflow-x:auto; white-space:nowrap;}
  .entry .en-p{font-size:13px; line-height:1.45; color:var(--ink-dim); margin:10px 0 12px;}
  .entry .en-foot{display:flex; align-items:center; gap:7px; flex-wrap:wrap; font-size:11px; color:var(--ink-faint);}
  .en-chip{font-family:var(--font-mono); font-size:11.5px; padding:3px 9px; border-radius:7px; cursor:pointer;
    color:var(--ink-dim); background:color-mix(in srgb,var(--surface-solid) 70%, transparent);
    border:1px solid var(--border); transition:.14s; display:inline-flex; align-items:center; gap:5px;}
  .en-chip:hover{color:var(--ink); border-color:var(--ec); background:color-mix(in srgb,var(--ec) 12%, transparent);}
  .en-chip .cd{width:7px;height:7px;border-radius:50%;background:var(--cc,var(--ec));}
  .pgrid{display:grid; grid-template-columns:1fr; gap:12px;}
  .entry.p .en-row{display:flex; flex-wrap:wrap; gap:20px; align-items:flex-start; margin-top:10px;}
  .entry.p .pcol .pl{font-family:var(--font-mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--ink-faint); margin-bottom:7px;}
  .lbl-defs{font-family:var(--font-mono); font-size:11px; color:var(--ink-faint);}
</style>

<div id="viewport">
  <div id="world">
    <div id="grid"></div>
    <svg id="edges"></svg>
    <div id="catalog"></div>
  </div>
</div>

<div id="hud" class="glass">
  <p class="kick" id="hud-kick">grain · current generation</p>
  <h1 id="hud-title"></h1>
